version: "3.9"

services:
  # ── TimescaleDB (PostgreSQL + time-series extension) ───────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: riskdash-db
    environment:
      POSTGRES_USER: riskdash
      POSTGRES_PASSWORD: riskdash
      POSTGRES_DB: riskdash
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskdash"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (caching + optional pub/sub) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: riskdash-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────────────────────────
  backend:
    build: ./backend
    container_name: riskdash-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://riskdash:riskdash@db:5432/riskdash
      DATABASE_URL_SYNC: postgresql://riskdash:riskdash@db:5432/riskdash
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      LOG_LEVEL: INFO
      TICKERS: "^GSPC,GLE.PA,SIE.DE"
      FX_PAIR: "EURUSD=X"
      BASE_CURRENCY: EUR
      BACKFILL_YEARS: 5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (Next.js) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: riskdash-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
